<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog – BrawlMystery | Guides, Tipps &amp; News</title>
    <meta name="description" content="Der offizielle BrawlMystery Blog: Brawl Stars Guides, Tipps, Strategien und News – in Deutsch, Englisch, Französisch, Spanisch und Italienisch.">
    <link rel="canonical" href="https://brawlmystery.pages.dev/blog/">
    <link rel="alternate" hreflang="de" href="https://brawlmystery.pages.dev/de/">
    <link rel="alternate" hreflang="en" href="https://brawlmystery.pages.dev/en/">
    <link rel="alternate" hreflang="fr" href="https://brawlmystery.pages.dev/fr/">
    <link rel="alternate" hreflang="es" href="https://brawlmystery.pages.dev/es/">
    <link rel="alternate" hreflang="it" href="https://brawlmystery.pages.dev/it/">
    <meta property="og:title" content="Blog – BrawlMystery">
    <meta property="og:description" content="Guides, Tipps &amp; News rund um BrawlMystery und Brawl Stars.">
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://brawlmystery.pages.dev/blog/">
    <meta property="og:site_name" content="BrawlMystery">
    <meta property="og:image" content="https://brawlmystery.pages.dev/assets/og-image.svg">
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-3654554314003005" crossorigin="anonymous"></script>
    <link rel="icon" type="image/svg+xml" href="../assets/favicon.svg">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/seo-pages.css">
    <style>
        /* ── CSS-Variablen (damit seo-pages.css korrekt rendert) ── */
        :root {
            --accent: #ffd700;
            --text-primary: #ffffff;
            --text-secondary: rgba(255, 255, 255, 0.65);
            --font-headline: 'BrawlStarsHeadline', 'Impact', 'Arial Black', sans-serif;
        }

        /* ── Guide-Body Override: dunkel statt gläsern ── */
        .guide-body-wrap {
            background: rgba(20, 20, 40, 0.85);
            border-radius: 16px;
            padding: 28px 24px 32px;
            border: 2px solid rgba(138, 43, 226, 0.4);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            margin-top: 8px;
            /* kein backdrop-filter */
        }

        /* ── Seitentitel ── */
        .guide-container h1 {
            font-family: 'BrawlStarsHeadline', 'Impact', 'Arial Black', sans-serif;
            color: #ffd700;
            font-size: 1.7rem;
            margin-bottom: 8px;
        }

        /* ── Meta-Zeile ── */
        .guide-meta {
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.8rem;
            margin-bottom: 20px;
        }

        /* ── Suche ── */
        .blog-search-wrap { margin-bottom: 20px; }
        .blog-search-input {
            width: 100%;
            padding: 9px 14px;
            border-radius: 10px;
            border: 1px solid rgba(255, 215, 0, 0.3);
            background: rgba(20, 20, 40, 0.7);
            color: #ffffff;
            font-size: 0.9rem;
            font-family: 'BrawlStarsText', 'Segoe UI', sans-serif;
            outline: none;
            box-sizing: border-box;
            transition: border-color .2s;
        }
        .blog-search-input::placeholder { color: rgba(255,255,255,0.35); }
        .blog-search-input:focus { border-color: rgba(255,215,0,0.7); }

        /* ── Post-Grid ── */
        .blog-grid {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ── Post-Karte: dunkel wie Index-Boxen ── */
        .blog-card {
            display: block;
            position: relative;
            text-decoration: none;
            color: inherit;
            padding: 16px 18px;
            border-radius: 12px;
            border: 2px solid rgba(138, 43, 226, 0.4);
            background: rgba(20, 20, 40, 0.85);
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.5);
            transition: border-color .2s, background .2s, box-shadow .2s, transform .15s;
        }

        /* ── NEW-Badge ── */
        .new-badge {
            position: absolute;
            top: -1px;
            right: -1px;
            background: #ffd700;
            color: #1a1200;
            font-size: 0.6rem;
            font-weight: 800;
            font-family: 'BrawlStarsText', 'Segoe UI', sans-serif;
            padding: 3px 9px;
            border-radius: 0 10px 0 8px;
            letter-spacing: .06em;
            line-height: 1.4;
            box-shadow: 0 2px 6px rgba(255,215,0,0.4);
        }

        .blog-card:hover {
            border-color: rgba(138, 43, 226, 0.75);
            background: rgba(138, 43, 226, 0.2);
            box-shadow: 0 6px 15px rgba(138, 43, 226, 0.35);
            transform: translateY(-2px);
        }

        /* ── Karten-Meta (Tag / Datum / Sprache) ── */
        .blog-card-meta {
            display: flex;
            align-items: center;
            gap: 8px;
            flex-wrap: wrap;
            margin-bottom: 7px;
        }

        .blog-card-tag {
            font-size: 0.7rem;
            font-weight: 700;
            padding: 2px 9px;
            border-radius: 20px;
            background: rgba(255, 215, 0, 0.12);
            color: #ffd700;
            border: 1px solid rgba(255, 215, 0, 0.25);
        }

        .blog-card-date {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.35);
        }

        .blog-card-lang {
            font-size: 0.7rem;
            padding: 2px 7px;
            border-radius: 4px;
            background: rgba(255, 255, 255, 0.07);
            color: rgba(255, 255, 255, 0.4);
        }

        /* ── Karten-Titel ── */
        .blog-card-title {
            font-family: 'BrawlStarsText', 'Segoe UI', sans-serif;
            font-size: 0.95rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 5px;
            line-height: 1.4;
        }

        /* ── Karten-Vorschau ── */
        .blog-card-excerpt {
            font-family: 'BrawlStarsText', 'Segoe UI', sans-serif;
            font-size: 0.85rem;
            color: rgba(255, 255, 255, 0.55);
            line-height: 1.65;
        }

        /* ── Status-Meldungen ── */
        #blog-loading,
        #blog-error,
        #blog-empty {
            text-align: center;
            padding: 32px 16px;
            color: rgba(255, 255, 255, 0.4);
            font-size: 0.9rem;
        }

        /* ── Ad-Abstand ── */
        .blog-ad-top    { margin: 16px 0 20px; }
        .blog-ad-bottom { margin: 24px 0 4px; }
    </style>
</head>
<body>
    <!-- Sprachnavigation -->
    <nav class="language-selector">
        <div class="language-selector-inner">
            <a href="/de/" class="lang-link" id="lnk-de" title="Deutsch">🇩🇪 DE</a>
            <a href="/en/" class="lang-link" id="lnk-en" title="English">🇬🇧 EN</a>
            <a href="/fr/" class="lang-link" id="lnk-fr" title="Français">🇫🇷 FR</a>
            <a href="/es/" class="lang-link" id="lnk-es" title="Español">🇪🇸 ES</a>
            <a href="/it/" class="lang-link" id="lnk-it" title="Italiano">🇮🇹 IT</a>
        </div>
    </nav>

    <div class="guide-container">
        <!-- Zurück-Leiste -->
        <div class="back-bar">
            <a href="/de/" id="back-link">
                <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="19" y1="12" x2="5" y2="12"></line>
                    <polyline points="12 19 5 12 12 5"></polyline>
                </svg>
                <span id="back-text">Zurück zum Spiel</span>
            </a>
        </div>

        <div class="guide-body-wrap">
            <h1 id="page-title">📝 Blog</h1>
            <p class="guide-meta" id="page-sub">Guides, Tipps &amp; News rund um BrawlMystery</p>

            <!-- Suche -->
            <div class="blog-search-wrap">
                <input class="blog-search-input" id="blog-search" type="search" placeholder="Artikel suchen…" autocomplete="off">
            </div>

            <!-- Artikel-Liste -->
            <div id="blog-loading">Lädt Artikel…</div>
            <div id="blog-error"  style="display:none">Fehler beim Laden – bitte später erneut versuchen.</div>
            <div id="blog-empty"  style="display:none">Noch keine Artikel – komm bald wieder!</div>
            <div id="blog-grid"   class="blog-grid" style="display:none"></div>

            <!-- Ad unten -->
            <div class="blog-ad-bottom">
                <ins class="adsbygoogle" style="display:block"
                     data-ad-client="ca-pub-3654554314003005"
                     data-ad-slot="auto"
                     data-ad-format="auto"
                     data-full-width-responsive="true"></ins>
                <script>(adsbygoogle = window.adsbygoogle || []).push({});</script>
            </div>

            <!-- CTA -->
            <div style="margin-top: 28px; text-align: center;">
                <a href="/de/" id="cta-btn" class="seo-link-btn" style="font-size:1rem; padding:12px 28px;">🎮 Jetzt spielen →</a>
            </div>
        </div><!-- /.guide-body-wrap -->
    </div><!-- /.guide-container -->

    <!-- Footer -->
    <footer class="footer" style="max-width:800px; margin:20px auto 0; border-radius:12px;">
        <a href="/de/" id="footer-home" class="footer-link">Spiel</a>
        <span class="footer-separator">·</span>
        <a href="/blog/" class="footer-link">Blog</a>
        <span class="footer-separator">·</span>
        <a href="/impressum.html" class="footer-link">Impressum</a>
        <span class="footer-separator">·</span>
        <a href="/datenschutz.html" class="footer-link">Datenschutz</a>
    </footer>

    <script src="../js/ui.js" defer></script>
    <script>
    (function () {
        var API     = 'https://webcontrol-hq-api.karol-paschek.workers.dev';
        var SITE_ID = 'brawlmystery';

        var T = {
            de: { back:'Zurück zum Spiel', home:'/de/', title:'📝 Blog',
                  sub:'Guides, Tipps & News rund um BrawlMystery',
                  search:'Artikel suchen…', loading:'Lädt Artikel…',
                  error:'Fehler beim Laden – bitte später erneut versuchen.',
                  empty:'Noch keine Artikel – komm bald wieder!', cta:'🎮 Jetzt spielen →' },
            en: { back:'Back to Game', home:'/en/', title:'📝 Blog',
                  sub:'Guides, tips & news about BrawlMystery',
                  search:'Search articles…', loading:'Loading articles…',
                  error:'Failed to load – please try again later.',
                  empty:'No articles yet – check back soon!', cta:'🎮 Play now →' },
            fr: { back:'Retour au jeu', home:'/fr/', title:'📝 Blog',
                  sub:'Guides, astuces & actualités BrawlMystery',
                  search:'Rechercher des articles…', loading:'Chargement…',
                  error:'Erreur de chargement – réessayez plus tard.',
                  empty:'Aucun article pour l\'instant – revenez bientôt !', cta:'🎮 Jouer →' },
            es: { back:'Volver al juego', home:'/es/', title:'📝 Blog',
                  sub:'Guías, consejos & noticias de BrawlMystery',
                  search:'Buscar artículos…', loading:'Cargando…',
                  error:'Error al cargar – inténtalo más tarde.',
                  empty:'No hay artículos aún – ¡vuelve pronto!', cta:'🎮 Jugar →' },
            it: { back:'Torna al gioco', home:'/it/', title:'📝 Blog',
                  sub:'Guide, consigli & notizie su BrawlMystery',
                  search:'Cerca articoli…', loading:'Caricamento…',
                  error:'Errore nel caricamento – riprova più tardi.',
                  empty:'Nessun articolo ancora – torna presto!', cta:'🎮 Gioca →' }
        };

        var LANG_FLAGS = { de:'🇩🇪', en:'🇬🇧', fr:'🇫🇷', es:'🇪🇸', it:'🇮🇹' };

        function detectLang() {
            var stored = localStorage.getItem('bm_lang');
            if (stored && T[stored]) return stored;
            var nav = (navigator.language || '').slice(0, 2).toLowerCase();
            return T[nav] ? nav : 'de';
        }

        var lang     = detectLang();
        var allPosts = [];

        function applyUI() {
            var t = T[lang];
            document.documentElement.lang = lang;
            document.getElementById('back-link').href         = t.home;
            document.getElementById('back-text').textContent  = t.back;
            document.getElementById('footer-home').href       = t.home;
            document.getElementById('cta-btn').href           = t.home;
            document.getElementById('cta-btn').textContent    = t.cta;
            document.getElementById('page-title').textContent = t.title;
            document.getElementById('page-sub').textContent   = t.sub;
            document.getElementById('blog-search').placeholder = t.search;
            document.getElementById('blog-loading').textContent = t.loading;
            document.getElementById('blog-error').textContent   = t.error;
            document.getElementById('blog-empty').textContent   = t.empty;
            document.querySelectorAll('.lang-link').forEach(function(a) { a.classList.remove('active'); });
            var lnk = document.getElementById('lnk-' + lang);
            if (lnk) lnk.classList.add('active');
        }

        function esc(s) {
            return String(s || '')
                .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        }

        function fmtDate(d) {
            var loc = { de:'de-DE', en:'en-GB', fr:'fr-FR', es:'es-ES', it:'it-IT' };
            return new Date(d).toLocaleDateString(loc[lang] || 'en-GB',
                { year:'numeric', month:'short', day:'numeric' });
        }

        function renderPosts(query) {
            var grid  = document.getElementById('blog-grid');
            var empty = document.getElementById('blog-empty');
            var q = (query || '').toLowerCase().trim();
            var langPosts = allPosts.filter(function(p){ return (p.lang || 'de') === lang; });
            var newestId = langPosts.length ? langPosts.reduce(function(a, b) {
                return new Date(b.published_at || b.created_at) > new Date(a.published_at || a.created_at) ? b : a;
            }).id : null;
            var filtered  = !q ? langPosts : langPosts.filter(function(p){
                return (p.title   || '').toLowerCase().includes(q)
                    || (p.excerpt || '').toLowerCase().includes(q)
                    || (p.content || '').toLowerCase().includes(q);
            });

            if (!filtered.length) {
                grid.style.display  = 'none';
                empty.style.display = '';
                return;
            }
            empty.style.display = 'none';
            grid.style.display  = '';

            grid.innerHTML = filtered.map(function(p) {
                var slug = p.slug || '';
                var href = slug ? '/blog/' + lang + '/' + esc(slug) : '#';
                var tags = (p.tags || '').split(',').map(function(t){ return t.trim(); }).filter(Boolean);
                var flag = LANG_FLAGS[p.lang] || '';
                return '<a class="blog-card" href="' + href + '">' + (p.id === newestId ? '<span class="new-badge">NEW</span>' : '')
                    + '<div class="blog-card-meta">'
                    + tags.map(function(t){ return '<span class="blog-card-tag">' + esc(t) + '</span>'; }).join('')
                    + (flag ? '<span class="blog-card-lang">' + flag + ' ' + esc((p.lang||'').toUpperCase()) + '</span>' : '')
                    + '<span class="blog-card-date">' + fmtDate(p.published_at || p.created_at) + '</span>'
                    + '</div>'
                    + '<div class="blog-card-title">' + esc(p.title) + '</div>'
                    + (p.excerpt ? '<div class="blog-card-excerpt">' + esc(p.excerpt) + '</div>' : '')
                    + '</a>';
            }).join('');
        }



        /* Sprachlinks: Seite bleibt, nur Sprache wechselt */
        document.querySelectorAll('.lang-link').forEach(function(a) {
            a.addEventListener('click', function(e) {
                e.preventDefault();
                var m = this.getAttribute('href').match(/\/([a-z]{2})\//);
                if (m && T[m[1]]) {
                    lang = m[1];
                    localStorage.setItem('bm_lang', lang);
                    applyUI();
                    document.getElementById('blog-search').value = '';
                    renderPosts('');
                }
            });
        });

        async function loadPosts() {
            document.getElementById('blog-loading').style.display = '';
            document.getElementById('blog-error').style.display   = 'none';
            document.getElementById('blog-empty').style.display   = 'none';
            document.getElementById('blog-grid').style.display    = 'none';
            try {
                var res = await fetch(API + '/api/blog/published?site_id=' + SITE_ID);
                if (!res.ok) throw new Error('HTTP ' + res.status);
                allPosts = await res.json();
                document.getElementById('blog-loading').style.display = 'none';
                if (!allPosts.length) {
                    document.getElementById('blog-empty').style.display = '';
                    return;
                }
                renderPosts('');
            } catch (e) {
                document.getElementById('blog-loading').style.display = 'none';
                document.getElementById('blog-error').style.display   = '';
            }
        }

        /* Error-Tracking */
        function sendError(type, msg, stack) {
            fetch(API + '/api/errors', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    site_id: SITE_ID, error_type: type,
                    message: String(msg).slice(0, 500), stack: stack || null,
                    path: window.location.pathname
                })
            }).catch(function(){});
        }
        window.addEventListener('error', function(e){
            sendError('RuntimeError', e.message, e.error && e.error.stack);
        });
        window.addEventListener('unhandledrejection', function(e){
            sendError('UnhandledRejection', e.reason ? String(e.reason) : 'Rejection', null);
        });

        document.getElementById('blog-search').addEventListener('input', function() {
            renderPosts(this.value);
        });

        applyUI();
        loadPosts();
    })();
    </script>
</body>
</html>
